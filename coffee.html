<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            cursor: url('https://raw.githubusercontent.com/DihanRamanayaka/hello/5a4d12ab2fa436ade9a127351d92f59a7dbba537/assets/cursor/cursor.svg'), auto;
        }
        a, button, .clickable, #search-btn, #close-btn {
            cursor: url('https://raw.githubusercontent.com/DihanRamanayaka/hello/5a4d12ab2fa436ade9a127351d92f59a7dbba537/assets/cursor/pointinghand.svg'), pointer;
        }
        input {
            cursor: text;
        }

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #fcfcfc; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        html, body { height: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 bg-gray-50">

    <div id="home-view" class="w-full max-w-lg flex flex-col gap-4 flex-grow justify-center">
        <h1 class="text-xs text-gray-400 uppercase tracking-widest text-center mb-2">Coffee Friend</h1>
        
        <div class="bg-white rounded-3xl p-6 card-shadow border border-gray-100 flex gap-4 items-start w-full">
            <div class="w-14 h-14 bg-amber-100 rounded-full overflow-hidden flex-shrink-0 flex items-center justify-center border-2 border-white shadow-inner">
                <img src=https://cdn.discordapp.com/avatars/1360805395609813002/209386929724a04483f63e86010dd4e6.webp?size=1024" alt="Profile" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col flex-grow">
                <h2 class="text-sm font-bold text-gray-800">Coffee Flued Student AKA Isuru</h2>
                <p class="text-xs text-gray-500">Coffee Addictive</p>
                <p class="text-xs text-gray-600 mt-2 italic">Ready to brew? Search for 'coffee' to see what I found for you!</p>
            </div>
        </div>

        <div class="bg-white rounded-full p-2 flex items-center justify-between border border-gray-200 card-shadow mt-auto md:mt-4 w-full">
            <input type="text" id="search-input" placeholder="Search coffee recipes..." class="bg-transparent text-gray-600 text-sm ml-4 font-bold w-full outline-none placeholder:text-gray-400">
            <button id="search-btn" class="bg-[#D2B48C] hover:bg-[#c2a47c] active:scale-95 transition-all w-12 h-12 rounded-full flex items-center justify-center shadow-md flex-shrink-0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <div id="result-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-3xl p-4 card-shadow relative fade-in flex flex-col max-h-[85vh]">
            <button id="close-btn" class="absolute -top-3 -right-3 bg-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center text-gray-500 hover:text-red-500 border border-gray-100 z-10 transition-transform hover:scale-105">
                &times;
            </button>
            
            <div class="w-full aspect-video bg-gray-100 rounded-2xl overflow-hidden mb-4 border border-gray-100">
                <img id="coffee-image" src="" alt="Coffee result" class="w-full h-full object-cover">
            </div>

            <div class="flex-grow overflow-y-auto custom-scrollbar pr-2">
                <h3 id="recipe-title" class="text-lg font-bold text-gray-800 mb-2">Recipe</h3>
                <div id="recipe-content" class="text-xs text-gray-600 space-y-3">
                    <p class="text-gray-400 animate-pulse">Brewing...</p>
                </div>
            </div>

            <div class="flex gap-3 items-center mt-4 pt-4 border-t border-gray-100">
                <div class="w-10 h-10 bg-amber-100 rounded-full overflow-hidden flex-shrink-0 flex items-center justify-center border-2 border-white shadow-inner">
                    <img src="https://cdn-icons-png.freepik.com/512/5690/5690014.png" alt="Profile" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 class="text-xs font-bold text-gray-800">Coffee Bot</h3>
                    <p id="friend-comment" class="text-[10px] text-gray-500 italic">This one is perfect for you!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const resultOverlay = document.getElementById('result-overlay');
        const coffeeImage = document.getElementById('coffee-image');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const closeBtn = document.getElementById('close-btn');
        const recipeTitle = document.getElementById('recipe-title');
        const recipeContent = document.getElementById('recipe-content');
        const friendComment = document.getElementById('friend-comment');

        async function fetchCoffeeRecipe(query) {
            const url = `https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${query}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.drinks) {
                    recipeContent.innerHTML = `<p>I couldn't find a recipe for "${query}". Try 'coffee'.</p>`;
                    return;
                }

                const recipes = data.drinks;
                const selected = recipes[Math.floor(Math.random() * recipes.length)];

                coffeeImage.src = selected.strDrinkThumb;
                recipeTitle.textContent = selected.strDrink;
                
                let ingredients = [];
                for (let i = 1; i <= 15; i++) {
                    if (selected[`strIngredient${i}`]) {
                        ingredients.push(`${selected[`strIngredient${i}`]} (${selected[`strMeasure${i}`] || 'to taste'})`);
                    }
                }

                recipeContent.innerHTML = `
                    <p class="font-bold">Ingredients:</p>
                    <ul class="list-disc pl-4">${ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
                    <p class="font-bold mt-2">Instructions:</p>
                    <p>${selected.strInstructions}</p>
                `;
                
                friendComment.textContent = `I found a real professional recipe for a ${selected.strDrink}! Enjoy!`;
                
            } catch (err) {
                recipeContent.innerHTML = `<p>The recipe server is feeling sleepy! Try again.</p>`;
            }
        }

        searchBtn.addEventListener('click', () => {
            const q = searchInput.value.toLowerCase().trim();
            if (!q) return;
            
            fetchCoffeeRecipe(q);
            resultOverlay.classList.remove('hidden');
            resultOverlay.classList.add('flex');
        });

        closeBtn.addEventListener('click', () => {
            resultOverlay.classList.add('hidden');
            resultOverlay.classList.remove('flex');
        });
    </script>
</body>
</html>
