<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the heart</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #111625 0%, #05070c 100%);
            overflow: hidden;
        }
        .font-grotesk {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Subtle ambient grid lines in background for creative depth */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }

        /* Ambient floating light specs */
        @keyframes float-bug {
            0%, 100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.15; }
            50% { transform: translateY(-25px) translateX(15px) scale(1.3); opacity: 0.4; }
        }
        .ambient-bug {
            animation: float-bug 10s ease-in-out infinite alternate;
        }

        /* High-performance Transition for cards */
        .collage-card {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.2s ease, 
                        border-color 0.2s ease, 
                        opacity 0.4s ease;
            will-change: transform, opacity;
        }

        /* Centered & Scalable grid wrapper */
        #collage-grid {
            transform-origin: center center;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Minimalist home button */
        .home-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between relative select-none bg-grid">

    <!-- Ambient colorful background light specs -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden" id="ambient-container"></div>

    <!-- MAIN INTERACTIVE DISPLAY -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center py-12 px-4">
        
        <!-- INTRO CONTENT PANEL -->
        <div class="text-center max-w-xl mx-auto mb-10 relative z-20 px-4">
            <p class="text-[19px] font-mono tracking-[0.3em] text-orange-500 uppercase mb-2 animate-pulse">404 • Lost in the Woods</p>
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight font-grotesk text-white mb-2">
                Lost in the woods. Found in design.
            </h1>
            <p class="text-[11px] text-gray-500 max-w-xs mx-auto">
                Sweep your cursor over the colorful mosaic tiles to play satisfying musical chimes.
            </p>
        </div>

        <!-- COLLAGE CONTAINER BOX -->
        <div id="grid-scaling-wrapper" class="w-full flex justify-center items-center overflow-visible py-4 min-h-[300px]">
            <div id="collage-grid" class="grid grid-cols-21 gap-1.5 relative pointer-events-auto" style="width: 630px; height: 300px;">
                <!-- Generated programmatically via Javascript -->
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="relative z-20 mt-10 flex flex-wrap gap-4 items-center justify-center">
            <!-- Redirect Link -->
            <a href="https://dihanramanayaka.github.io/hello/" class="home-btn w-12 h-12 rounded-full flex items-center justify-center text-white">
                <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>

    </main>

    <!-- MINIMAL FOOTER -->
    <footer class="relative z-30 w-full max-w-5xl mx-auto px-6 py-6 text-center flex justify-between items-center text-[8px] tracking-[0.2em] text-gray-700 uppercase">
      
    </footer>

    <!-- INTERACTIVE SYSTEM JAVASCRIPT LOGIC -->
    <script>
        const gridMapping = [
            // --- FIRST DIGIT: "4" ---
            { col: 4, row: 1 }, { col: 3, row: 2 }, { col: 4, row: 2 }, { col: 2, row: 3 }, { col: 4, row: 3 }, { col: 1, row: 4 }, { col: 4, row: 4 }, { col: 1, row: 5 }, { col: 4, row: 5 }, { col: 1, row: 6 }, { col: 2, row: 6 }, { col: 3, row: 6 }, { col: 4, row: 6 }, { col: 5, row: 6 }, { col: 6, row: 6 }, { col: 4, row: 7 }, { col: 4, row: 8 }, { col: 4, row: 9 }, { col: 4, row: 10 },
            // --- SECOND DIGIT: "0" ---
            { col: 10, row: 1 }, { col: 11, row: 1 }, { col: 12, row: 1 }, { col: 9, row: 2 }, { col: 13, row: 2 }, { col: 9, row: 3 }, { col: 13, row: 3 }, { col: 9, row: 4 }, { col: 13, row: 4 }, { col: 9, row: 5 }, { col: 13, row: 5 }, { col: 9, row: 6 }, { col: 13, row: 6 }, { col: 9, row: 7 }, { col: 13, row: 7 }, { col: 9, row: 8 }, { col: 13, row: 8 }, { col: 9, row: 9 }, { col: 13, row: 9 }, { col: 10, row: 10 }, { col: 11, row: 10 }, { col: 12, row: 10 },
            // --- THIRD DIGIT: "4" ---
            { col: 19, row: 1 }, { col: 18, row: 2 }, { col: 19, row: 2 }, { col: 17, row: 3 }, { col: 19, row: 3 }, { col: 16, row: 4 }, { col: 19, row: 4 }, { col: 16, row: 5 }, { col: 19, row: 5 }, { col: 16, row: 6 }, { col: 17, row: 6 }, { col: 18, row: 6 }, { col: 19, row: 6 }, { col: 20, row: 6 }, { col: 21, row: 6 }, { col: 19, row: 7 }, { col: 19, row: 8 }, { col: 19, row: 9 }, { col: 19, row: 10 }
        ];

        const cardDesigns = [
            { type: "gradient", color: "from-pink-500 to-rose-600", glow: "rgba(244, 63, 94, 0.6)" },
            { type: "gradient", color: "from-amber-400 to-orange-500", glow: "rgba(245, 158, 11, 0.6)" },
            { type: "gradient", color: "from-cyan-400 to-blue-500", glow: "rgba(6, 182, 212, 0.6)" },
            { type: "gradient", color: "from-emerald-400 to-teal-500", glow: "rgba(16, 185, 129, 0.6)" },
            { type: "gradient", color: "from-purple-600 to-fuchsia-600", glow: "rgba(168, 85, 247, 0.6)" },
            { type: "vector", color: "bg-indigo-950 text-indigo-400", icon: "fa-bolt", glow: "rgba(99, 102, 241, 0.6)" },
            { type: "vector", color: "bg-teal-950 text-teal-400", icon: "fa-seedling", glow: "rgba(20, 184, 166, 0.6)" },
            { type: "vector", color: "bg-rose-950 text-rose-400", icon: "fa-heart", glow: "rgba(244, 63, 94, 0.6)" },
            { type: "vector", color: "bg-amber-950 text-amber-400", icon: "fa-star", glow: "rgba(245, 158, 11, 0.6)" },
            { type: "ui", color: "bg-zinc-900", dotColor: "bg-orange-500", glow: "rgba(249, 115, 22, 0.4)" },
            { type: "ui", color: "bg-zinc-900", dotColor: "bg-emerald-400", glow: "rgba(52, 211, 153, 0.4)" },
            { type: "ui", color: "bg-zinc-900", dotColor: "bg-cyan-400", glow: "rgba(34, 211, 238, 0.4)" }
        ];

        function getDesign(idx) { return cardDesigns[idx % cardDesigns.length]; }

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const pentatonicFrequencies = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00, 2093.00];

        function playChime(colIndex) {
            initAudio();
            const freq = pentatonicFrequencies[colIndex - 1] || 440;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.12);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.13);
        }

        const grid = document.getElementById("collage-grid");
        function buildCollageGrid() {
            grid.innerHTML = "";
            gridMapping.forEach((coord, index) => {
                const design = getDesign(index);
                const card = document.createElement("div");
                card.className = "collage-card relative rounded-md shadow border border-white/5 cursor-crosshair overflow-hidden flex flex-col items-center justify-center bg-zinc-950 select-none pointer-events-auto";
                card.style.gridColumn = coord.col; card.style.gridRow = coord.row;
                card.style.height = "24px"; card.style.width = "24px";
                let inner = design.type === "gradient" ? `<div class="absolute inset-0 bg-gradient-to-br ${design.color} opacity-85 hover:opacity-100"></div>` : (design.type === "vector" ? `<div class="absolute inset-0 ${design.color} flex items-center justify-center"><i class="fa-solid ${design.icon} text-[9px]"></i></div>` : `<div class="absolute inset-0 ${design.color} flex items-center justify-center"><div class="w-1.5 h-1.5 rounded-full ${design.dotColor} animate-pulse"></div></div>`);
                card.innerHTML = inner;
                card.addEventListener("mouseenter", () => {
                    playChime(coord.col);
                    card.style.transform = `scale(1.3) translate3d(0, -2px, 0)`;
                    card.style.boxShadow = `0 10px 20px ${design.glow}`;
                });
                card.addEventListener("mouseleave", () => {
                    card.style.transform = `scale(1)`;
                    card.style.boxShadow = "none";
                });
                grid.appendChild(card);
            });
        }

        window.onload = () => {
            buildCollageGrid();
            handleGridScaling();
            window.addEventListener("resize", handleGridScaling);
        };

        function handleGridScaling() {
            const wrapper = document.getElementById("grid-scaling-wrapper");
            const scaleFactor = Math.min(1, wrapper.clientWidth / 650);
            grid.style.transform = `scale(${scaleFactor})`;
        }
    </script>
</body>
</html>
