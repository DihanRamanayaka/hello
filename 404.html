<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Coffee Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern macOS-style black cursor */
        :root {
            --cursor-svg: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.43-6.73 6.73-2.43z"/></svg>';
            cursor: url(var(--cursor-svg)) 0 0, auto;
        }

        body {
            background-color: #2c2420; /* Deep Espresso */
            color: #e5d3c0; /* Warm Cream */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coffee-steam {
            animation: rise 3s infinite ease-in-out;
            opacity: 0.6;
            stroke: #e5d3c0;
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased">

    <div class="text-center p-8 max-w-lg">
        
        <!-- Minimalist Coffee Cup SVG -->
        <div class="mb-8 relative flex justify-center">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#e5d3c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
                <path d="M3 8h14v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V8Z"></path>
                <line x1="6" y1="2" x2="6" y2="4"></line>
                <line x1="10" y1="2" x2="10" y2="4"></line>
                <line x1="14" y1="2" x2="14" y2="4"></line>
            </svg>
            <div class="absolute -top-4 text-3xl coffee-steam">~~</div>
        </div>

        <h1 class="text-8xl font-bold mb-4 tracking-tighter">404</h1>
        <h2 class="text-2xl font-light mb-6 opacity-90">Ohh, the coffee is gone!</h2>
        <p class="text-lg opacity-60 mb-10 leading-relaxed">The page you're looking for doesn't exist or has been moved to a different cafe.</p>

        <a href="/" class="px-8 py-3 border border-[#e5d3c0] rounded-full hover:bg-[#e5d3c0] hover:text-[#2c2420] transition-all duration-300 uppercase tracking-widest text-sm">
            Return Home
        </a>
    </div>

</body>
</html>
