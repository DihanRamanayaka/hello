<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #fcfcfc; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Ensure scrolling works on small screens */
        html, body { height: 100%; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 bg-gray-50">

    <div id="home-view" class="w-full max-w-lg flex flex-col gap-4 flex-grow justify-center">
        <h1 class="text-xs text-gray-400 uppercase tracking-widest text-center mb-2">Cat Search</h1>
        
        <!-- Home Comment Bubble -->
        <div class="bg-white rounded-3xl p-6 card-shadow border border-gray-100 flex gap-4 items-start w-full">
            <div class="w-14 h-14 bg-pink-100 rounded-full overflow-hidden flex-shrink-0 flex items-center justify-center text-2xl border-2 border-white shadow-inner">
              <img src="https://i.pinimg.com/736x/19/69/7e/19697e36c0b08680a24a668930f49d3b.jpg" alt="Profile" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col flex-grow">
                <h2 class="text-sm font-bold text-gray-800">Su ZhyZai <3</h2>
                <p class="text-xs text-gray-500">Best Friend</p>
                <p class="text-xs text-gray-600 mt-2 italic">There is millions of cats who is cuter than Dihan but he is the coolest.
</p>
            </div>
        </div>

        <!-- Search Bar pinned near bottom -->
        <div class="bg-white rounded-full p-2 flex items-center justify-between border border-gray-200 card-shadow mt-auto md:mt-4 w-full">
            <input type="text" id="search-input" placeholder="Type kitty, cat, or meow..." class="bg-transparent text-gray-600 text-sm ml-4 font-bold w-full outline-none placeholder:text-gray-400">
            <button id="search-btn" class="bg-[#FFCCAA] hover:bg-[#ffb985] active:scale-95 transition-all w-12 h-12 rounded-full flex items-center justify-center shadow-md flex-shrink-0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <div id="result-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-3xl p-4 card-shadow relative fade-in flex flex-col">
            <!-- Close Button -->
            <button id="close-btn" class="absolute -top-3 -right-3 bg-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center text-gray-500 hover:text-red-500 border border-gray-100 z-10 transition-transform hover:scale-105">
                &times;
            </button>
            
            <!-- Result Image -->
            <div class="w-full aspect-square bg-gray-100 rounded-2xl overflow-hidden mb-4 border border-gray-100">
                <img id="cat-image" src="" alt="Cat result" class="w-full h-full object-cover">
            </div>

            <!-- Result Comment -->
            <div class="flex gap-3 items-center">
                <div class="w-10 h-10 bg-pink-100 rounded-full overflow-hidden flex-shrink-0 flex items-center justify-center text-lg border-2 border-white shadow-inner">
                 <img src="https://i.pinimg.com/736x/19/69/7e/19697e36c0b08680a24a668930f49d3b.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-800">Su ZhyZai <3</h3>
                    <p id="comment-text" class="text-xs text-gray-600">Cute cat found!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const homeView = document.getElementById('home-view');
        const resultOverlay = document.getElementById('result-overlay');
        const catImage = document.getElementById('cat-image');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const closeBtn = document.getElementById('close-btn');
        const commentText = document.getElementById('comment-text');

        const comments = [
            "Look at this fluff! Absolutely purr-fect.",
            "My favorite kind of friend.",
            "This one is definitely stealing the spotlight today!",
            "Too cute to handle, isn't it?"
        ];

        async function fetchCat(retryCount = 0) {
            const MAX_RETRIES = 5;
            
            // Set loading state
            searchBtn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
            searchInput.disabled = true;

            try {
                const response = await fetch('https://api.thecatapi.com/v1/images/search');
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                
                catImage.src = data[0].url;
                catImage.onload = () => {
                    // Reset UI
                    searchBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
                    searchInput.disabled = false;
                    
                    // Show result
                    commentText.textContent = comments[Math.floor(Math.random() * comments.length)];
                    resultOverlay.classList.remove('hidden');
                    resultOverlay.classList.add('flex');
                };
            } catch (error) {
                if (retryCount < MAX_RETRIES) {
                    setTimeout(() => fetchCat(retryCount + 1), 1000);
                } else {
                    searchBtn.innerHTML = '❌';
                    searchInput.disabled = false;
                    // Reset to a default friendly message if API completely fails
                    commentText.textContent = "Cats are hiding! Try again?";
                }
            }
        }

        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.toLowerCase();
            if (['kitty', 'cat', 'meow'].includes(query)) {
                fetchCat();
            } else {
                // Not using alert per guidelines
                commentText.textContent = "Please type 'kitty', 'cat', or 'meow' to find a cat!";
            }
        });

        closeBtn.addEventListener('click', () => {
            resultOverlay.classList.add('hidden');
            resultOverlay.classList.remove('flex');
            searchInput.value = '';
        });
    </script>
</body>
</html>
